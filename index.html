<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earn Leave Calculator | अर्जित अवकाश कैलकुलेटर</title>
    <meta name="description" content="एक आधुनिक और सटीक अर्जित अवकाश कैलकुलेटर। सरकारी कर्मचारियों के लिए विशेष रूप से डिज़ाइन किया गया।">
    <meta name="keywords" content="Earn Leave, Calculator, Bihar Government, Service Boundary, EL Calculator">
    <link rel="stylesheet" href="shared/ui/buttons/action-buttons.css">
    <link rel="stylesheet" href="widgets/widgets.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --border: #e2e8f0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 40px 20px;
            color: #1e293b;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .header-section {
            text-align: center;
            margin-bottom: 30px;
            width: 100%;
            max-width: 1200px;
        }

        .header-section h1 {
            font-size: clamp(24px, 5vw, 36px);
            font-weight: 800;
            color: #0f172a;
            margin-bottom: 12px;
            letter-spacing: -0.025em;
            line-height: 1.2;
        }

        .header-section p {
            color: #64748b;
            font-size: clamp(14px, 2vw, 16px);
            max-width: 600px;
            margin: 0 auto;
        }

        .main-card {
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: 
                0 4px 6px -1px rgba(0, 0, 0, 0.1), 
                0 2px 4px -1px rgba(0, 0, 0, 0.06),
                0 20px 25px -5px rgba(0, 0, 0, 0.1);
            padding: clamp(20px, 5vw, 40px);
            width: 100%;
            max-width: 1200px;
            border: 1px solid var(--border);
            box-sizing: border-box;
            margin-bottom: 40px;
        }

        .action-bar {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin-bottom: 30px;
            padding-bottom: 25px;
            border-bottom: 1px solid var(--border);
        }

        @media (max-width: 640px) {
            body {
                padding: 20px 15px;
            }
            .action-bar {
                gap: 8px;
            }
            .btn-base {
                flex: 1 1 calc(50% - 8px);
                justify-content: center;
                padding: 12px 16px;
                font-size: 14px;
            }
        }

        /* Responsive Print */
        @media print {
            @page { size: landscape; margin: 10mm; }
            body { padding: 0; background: white; }
            .main-card { box-shadow: none; border: none; padding: 0; width: 100%; max-width: 100%; }
            .action-bar, .header-section p { display: none; }
            .header-section h1 { font-size: 20px; margin-bottom: 10px; }
            .user-info-table, .detail-table { width: 100% !important; border-collapse: collapse; }
        }
    </style>
</head>
<body>
    <div class="header-section">
        <h1>अर्जित अवकाश कैलकुलेटर</h1>
        <p>Unutilized Earn Leave Calculator (FSD & Atomic Design Edition)</p>
    </div>

    <div class="main-card">
        <div class="action-bar">
            <button id="clearAllBtn" class="btn-base btn-clear">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                Clear All
            </button>
            <button id="printBtn" class="btn-base btn-print">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>
                Print
            </button>
            <button id="downloadPdfBtn" class="btn-base btn-pdf">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="12" y1="18" x2="12" y2="12"></line><polyline points="9 15 12 18 15 15"></polyline></svg>
                PDF
            </button>
        </div>

        <div id="userInfoFormContainer"></div>
        <div id="leaveTableContainer"></div>
    </div>

    <footer style="margin-top: 40px; text-align: center; color: #94a3b8; font-size: 14px;">
        <p>© 2026 अर्जित अवकाश कैलकुलेटर | सभी अधिकार सुरक्षित।</p>
        <p style="font-size: 12px; margin-top: 5px;">Designed with ❤️ for High-Performance Service Records</p>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
    <script type="module" src="app.js?v=2.0"></script>
</body>
</html>
