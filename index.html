<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP Pro | Earn Leave Calculator</title>
    <link rel="stylesheet" href="shared/ui/buttons/action-buttons.css">
    <link rel="stylesheet" href="widgets/widgets.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #4a00e0;
            --sidebar-bg: #f8f9fa;
            --topbar-bg: #ffffff;
            --body-bg: #f0f2f5;
            --text-main: #334155;
            --text-muted: #64748b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--body-bg);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 240px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            padding: 20px 0;
        }

        .sidebar-logo {
            padding: 0 24px 30px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 22px;
            font-weight: 700;
            color: var(--primary-color);
        }

        .sidebar-logo .logo-icon {
            width: 32px;
            height: 32px;
            background: var(--primary-color);
            border-radius: 8px;
        }

        .nav-item {
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.2s;
        }

        .nav-item:hover, .nav-item.active {
            color: var(--primary-color);
            background-color: #f1f5f9;
        }

        .nav-item.active {
            border-right: 3px solid var(--primary-color);
        }

        /* Main Content */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .top-bar {
            height: 70px;
            background-color: var(--topbar-bg);
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .search-box {
            background: #f1f5f9;
            border-radius: 8px;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            width: 300px;
        }

        .search-box input {
            border: none;
            background: transparent;
            outline: none;
            margin-left: 8px;
            width: 100%;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
        }

        .user-avatar {
            width: 36px;
            height: 36px;
            background: var(--primary-color);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        /* Dashboard Container */
        .dashboard-body {
            padding: 30px;
        }

        .dashboard-header {
            margin-bottom: 24px;
        }

        .dashboard-header h1 {
            font-size: 24px;
            font-weight: 700;
            color: #1e293b;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .stat-label {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: #1e293b;
        }

        .calculator-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            padding: 30px;
            width: 297mm;
            margin: 0 auto;
        }

        .toolbar {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-bottom: 20px;
        }

        /* Print Settings */
        @media print {
            .sidebar, .top-bar, .toolbar, .dashboard-header, .stats-grid { display: none !important; }
            body { background: white; padding: 0; display: block; height: auto; }
            .main-content { overflow: visible; display: block; }
            .calculator-card { box-shadow: none; width: 100%; padding: 0; margin: 0; }
            .dashboard-body { padding: 0; }
        }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-logo">
            <div class="logo-icon"></div>
            ERP Pro
        </div>
        <nav>
            <a href="#" class="nav-item">Dashboard</a>
            <a href="#" class="nav-item">Employees</a>
            <a href="#" class="nav-item">Attendance</a>
            <a href="#" class="nav-item active">Payroll (Calculator)</a>
            <a href="#" class="nav-item">Reports</a>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <header class="top-bar">
            <div class="search-box">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                <input type="text" placeholder="Search employees, records...">
            </div>
            <div class="user-profile">
                <div class="user-avatar">AD</div>
                Admin User
            </div>
        </header>

        <div class="dashboard-body">
            <div class="dashboard-header">
                <h1>अर्जित अवकाश कैलकुलेटर</h1>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-label">Total Days (Current Period)</div>
                    <div id="statTotalDays" class="stat-value">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Leave Earned</div>
                    <div id="statLeaveEarned" class="stat-value">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label" style="color: #ef4444;">Pending Leave (Taken)</div>
                    <div id="statLeaveTaken" class="stat-value" style="color: #ef4444;">0</div>
                </div>
            </div>

            <div class="toolbar">
                <button id="saveHtmlBtn" class="btn-base btn-save">Save (HTML)</button>
                <button id="clearAllBtn" class="btn-base btn-clear">Clear All</button>
                <button id="printBtn" class="btn-base btn-print">Print</button>
                <button id="downloadPdfBtn" class="btn-base btn-pdf">PDF Download</button>
            </div>

            <div class="calculator-card">
                <div id="userInfoFormContainer"></div>
                <div id="leaveTableContainer"></div>
            </div>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
    <script type="module" src="app.js"></script>
</body>
</html>
